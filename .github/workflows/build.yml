name: Build APK

on:
  workflow_dispatch: { }
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build APK
        working-directory: ./
        run: |
          ./gradlew build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-from-other-repo
          path: ./**/*.apk
